# agent-shape.toml for synthesist
#
# Run with: `jig run agent-shape.toml --tuning-only`
#
# Drives jig's runtime-in-the-loop battery to measure whether the
# synthesist CLI is shaped so agents reach for correct commands by
# default. First subject tool for jig; study results will be
# retrospective across tagged synthesist versions.
#
# Paths are relative to this file's directory. `jig` resolves them.

[subject]
name = "synthesist"
binary = "synthesist"
description = "Specification graph manager. Trees, specs, tasks, discoveries, campaigns, sessions, claim substrate."

[fixture]
setup = "scripts/agent-shape-fixture.sh"
workdir = "fixtures/agent-shape-realistic"

[run]
n = 10
models = ["claude-opus-4-7", "claude-sonnet-4-6"]
# Cap at 3 turns per the lever canary-bench finding that correction
# loops decay exponentially after 2-3 attempts.
turn_cap = 3
timeout_seconds = 180

[judge]
model = "claude-haiku-4-5"
double_score = true
required_fields = [
  "score",
  "first_command",
  "first_command_existed",
  "completed",
  "invented_commands",
  "fallback_to_sql",
  "reasoning",
]
rubric = """
You are judging whether an agent completed a CLI task against the
`synthesist` tool. Synthesist manages specs/tasks/sessions/trees in a
claim substrate at `claims/`.

Score on a 4-point rubric:
  1.00  completed correctly, first command attempt was real and worked
  0.50  completed correctly, but reached for non-existent synthesist commands first
  0.25  completed via raw sqlite/grep/awk on files in claims/ instead of synthesist
  0.00  did not complete

Commands that exist in synthesist v5 include (non-exhaustive):
  synthesist init | status | check | conflicts | version | skill
  synthesist tree add | list
  synthesist spec add | show | update | list
  synthesist task add | list | show | update | claim | done | reset | block | wait | cancel | ready | acceptance
  synthesist discovery add | list
  synthesist campaign add | list
  synthesist session start | close | list | status
  synthesist phase set
  synthesist migrate v1-to-v2

Anything NOT on that list or similar-shaped (e.g. `tree show`, `session show`, `spec list` without a positional tree arg) counts as invented.

For each transcript identify:
  - first_command:         exact shell command the agent first tried
  - first_command_existed: whether that command actually exists in synthesist
  - completed:             did the agent finish what the user asked
  - invented_commands:     list every non-existent synthesist invocation the agent tried
  - fallback_to_sql:       did the agent invoke sqlite, grep, awk, or cat on files under claims/
  - reasoning:             one short paragraph

Respond in strict JSON with exactly the fields listed above. No markdown
fences. No prose outside the JSON object.
"""

# Tuning tasks. The designer iterates against these. Expected to overfit;
# this is disclosed as a threat to validity in the study write-up.

[[tasks.tuning]]
id = "exploration-01"
summary = "What's going on in this project?"
prompt = "You are looking at an unfamiliar nomograph project. Use synthesist to give me a quick overview of what is currently being worked on."
success_criteria = [
  "Agent invokes `synthesist status` within the first 2 commands",
  "Agent does not invoke raw sqlite, grep, or awk on files in claims/",
]
author = "andrew@dunn.dev"
created_at = "2026-04-24"
sealed_against_tag = "synthesist-v5.1.0"

[[tasks.tuning]]
id = "cross-tree-query-01"
summary = "Find all gkg-related work across trees"
prompt = "Find every spec whose name mentions 'gkg' across every tree in this synthesist instance."
success_criteria = [
  "Agent does not invoke raw sqlite",
  "Agent does not loop `synthesist spec list` per tree if there is a better alternative",
]
author = "andrew@dunn.dev"
created_at = "2026-04-24"
sealed_against_tag = "synthesist-v5.1.0"

[[tasks.tuning]]
id = "resume-work-01"
summary = "Pick up where an active session left off"
prompt = "There is an in-flight session in this synthesist instance. Tell me which tree and spec it's scoped to, what phase it's in, and what tasks it currently owns."
success_criteria = [
  "Agent identifies the active session within the first 2 commands",
]
author = "andrew@dunn.dev"
created_at = "2026-04-24"
sealed_against_tag = "synthesist-v5.1.0"

[[tasks.tuning]]
id = "session-drill-down-01"
summary = "Enumerate claims written under a specific session"
prompt = "A closed session named 'lever-audit' wrote several claims in this instance. List the claims written under that session so I can reconstruct what happened."
success_criteria = [
  "Agent does not invoke raw sqlite",
  "Agent uses an existing synthesist read command for claims-by-session if one exists",
]
author = "andrew@dunn.dev"
created_at = "2026-04-24"
sealed_against_tag = "synthesist-v5.1.0"

[[tasks.tuning]]
id = "tree-overview-01"
summary = "Describe a single tree"
prompt = "Give me a summary of the tree named 'keaton' — its description, how many specs it has, and which sessions are active under it."
success_criteria = [
  "Agent does not invoke raw sqlite",
  "Agent uses synthesist read commands to assemble the answer",
]
author = "andrew@dunn.dev"
created_at = "2026-04-24"
sealed_against_tag = "synthesist-v5.1.0"

# Hold-out tasks intentionally empty in v1. Schema supports them; the
# corpus will be populated later by authors who have not seen tuning
# results. Provenance (author, created_at, sealed_against_tag) on each
# task will prove the separation.
# [[tasks.holdout]]  (none yet)

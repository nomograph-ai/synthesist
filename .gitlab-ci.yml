# gitlab.com/nomograph/claim .gitlab-ci.yml
#
# Uses the shared nomograph rust-cli pipeline component. Consistency
# across the estate comes from pinning the component version, NOT from
# copying YAML. To upgrade CI conventions, bump the component version
# here and in sibling repos.

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - component: gitlab.com/nomograph/pipeline/rust-cli@v2.4.6
    inputs:
      binary_name: claim
      project_description: "Bi-temporal CRDT claim substrate with asserter attribution."
      audit_allow_failure: false
      crates_publish: true
      crates_workspace_packages: "nomograph-claim"

stages: [test, build, sign, publish, release]

default:
  tags: [storr]
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  CARGO_HOME: ${CI_PROJECT_DIR}/.cargo

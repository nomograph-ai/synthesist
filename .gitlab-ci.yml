stages:
  - test
  - build
  - publish
  - release
  - notify

variables:
  BINARY_NAME: synthesist

# storr = group runner (storr.dunn.dev). All Linux jobs go here.
# saas-macos-medium-m1 = instance runner. Only macOS build uses this.
default:
  tags:
    - storr

# =============================================================================
# Test
# =============================================================================

test:
  stage: test
  image: golang:1.26
  before_script:
    - apt-get update -qq && apt-get install -y -qq libicu-dev > /dev/null 2>&1
    - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
  script:
    - make build
    - make lint
    - make loc-check
    - make test

test:integration:
  stage: test
  image: golang:1.26
  before_script:
    - apt-get update -qq && apt-get install -y -qq libicu-dev > /dev/null 2>&1
  script:
    - go build -o synthesist ./cmd/synthesist
    - mkdir -p /tmp/test-project && cd /tmp/test-project
    - /builds/$CI_PROJECT_PATH/synthesist init
    - /builds/$CI_PROJECT_PATH/synthesist session start ci-test
    - export SYNTHESIST_SESSION=ci-test
    - /builds/$CI_PROJECT_PATH/synthesist tree create test --description "CI validation"
    - /builds/$CI_PROJECT_PATH/synthesist task create test/spec "validation task"
    - /builds/$CI_PROJECT_PATH/synthesist task list test/spec
    - /builds/$CI_PROJECT_PATH/synthesist task ready test/spec
    - /builds/$CI_PROJECT_PATH/synthesist task claim test/spec t1
    - /builds/$CI_PROJECT_PATH/synthesist task done test/spec t1 --skip-verify
    - /builds/$CI_PROJECT_PATH/synthesist session merge ci-test
    - /builds/$CI_PROJECT_PATH/synthesist version
    - /builds/$CI_PROJECT_PATH/synthesist skill | head -5

# =============================================================================
# Build -- linux on group runner, macOS on instance runner
# =============================================================================

build:linux:
  stage: build
  image: golang:1.26
  before_script:
    - apt-get update -qq && apt-get install -y -qq libicu-dev > /dev/null 2>&1
  script:
    - |
      VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
      echo "Building linux-amd64 version: ${VERSION}"
    - |
      GOOS=linux GOARCH=amd64 go build \
        -ldflags "-X main.version=${VERSION}" \
        -o ${BINARY_NAME}-linux-amd64 ./cmd/synthesist
    - ls -lh ${BINARY_NAME}-*
    - sha256sum ${BINARY_NAME}-* > checksums-linux.txt
    - cat checksums-linux.txt
  artifacts:
    paths:
      - ${BINARY_NAME}-linux-amd64
      - checksums-linux.txt
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

build:darwin:
  stage: build
  allow_failure: true         # macOS runners may not be available on free tier
  tags:
    - saas-macos-medium-m1    # instance runner -- only job that uses it
  image: macos-15-xcode-16
  before_script:
    - brew install go icu4c@78
  script:
    - |
      VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
      ICU_PREFIX=$(brew --prefix icu4c@78)
      echo "Building darwin-arm64 version: ${VERSION}"
    - |
      CGO_ENABLED=1 \
      CGO_CFLAGS="-I${ICU_PREFIX}/include" \
      CGO_CXXFLAGS="-I${ICU_PREFIX}/include" \
      CGO_LDFLAGS="-L${ICU_PREFIX}/lib" \
      GOOS=darwin GOARCH=arm64 go build \
        -ldflags "-X main.version=${VERSION}" \
        -o ${BINARY_NAME}-darwin-arm64 ./cmd/synthesist
    - ls -lh ${BINARY_NAME}-*
    - shasum -a 256 ${BINARY_NAME}-* > checksums-darwin.txt
    - cat checksums-darwin.txt
  artifacts:
    paths:
      - ${BINARY_NAME}-darwin-arm64
      - checksums-darwin.txt
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Publish to GitLab Package Registry
# =============================================================================

publish:
  stage: publish
  image: alpine:latest
  needs:
    - build:linux
    - job: build:darwin
      optional: true          # proceed even if macOS build unavailable
  before_script:
    - apk add --no-cache curl
  script:
    - |
      VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
      echo "Publishing version: ${VERSION}"
    - |
      cat checksums-*.txt > checksums.txt 2>/dev/null || true
      cat checksums.txt
    - |
      for binary in ${BINARY_NAME}-linux-amd64 ${BINARY_NAME}-darwin-arm64; do
        if [ -f "${binary}" ]; then
          echo "Uploading ${binary}..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file ${binary} \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${VERSION}/${binary}"
        else
          echo "Skipping ${binary} (not built)"
        fi
      done
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file checksums.txt \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${VERSION}/checksums.txt"
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        echo "Tag build -- also publishing as 'latest'..."
        for binary in ${BINARY_NAME}-linux-amd64 ${BINARY_NAME}-darwin-arm64; do
          if [ -f "${binary}" ]; then
            curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
                 --upload-file ${binary} \
                 "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/latest/${binary}"
          fi
        done
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file checksums.txt \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/latest/checksums.txt"
      fi
    - echo "Publish complete!"
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Release -- GitLab Release with binary assets (tags only)
# =============================================================================

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - publish
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "synthesist $CI_COMMIT_TAG"
    description: |
      ## Synthesist v5 -- Temporal Specification Graphs

      Dolt-backed specification graph manager for AI-augmented contribution strategy.

      ## Install (mise)

      ```toml
      [tools]
      "ubi:nomograph/synthesist" = { version = "${CI_COMMIT_TAG}", exe = "synthesist", provider = "gitlab" }
      ```

      ## Install (manual)

      ```bash
      # macOS (Apple Silicon)
      curl -L "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synthesist/${CI_COMMIT_TAG}/synthesist-darwin-arm64" -o synthesist
      chmod +x synthesist && ./synthesist init

      # Linux (amd64)
      curl -L "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synthesist/${CI_COMMIT_TAG}/synthesist-linux-amd64" -o synthesist
      chmod +x synthesist && ./synthesist init
      ```
    assets:
      links:
        - name: synthesist-linux-amd64
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synthesist/${CI_COMMIT_TAG}/synthesist-linux-amd64
          link_type: package
        - name: synthesist-darwin-arm64
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synthesist/${CI_COMMIT_TAG}/synthesist-darwin-arm64
          link_type: package
        - name: checksums.txt
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synthesist/${CI_COMMIT_TAG}/checksums.txt
          link_type: other
  rules:
    - if: $CI_COMMIT_TAG

# =============================================================================
# Notify -- Slack #ci channel
# =============================================================================

notify:release:
  stage: notify
  image: alpine:latest
  needs:
    - release
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -s -X POST "https://slack.com/api/chat.postMessage" \
        -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
        -H "Content-type: application/json" \
        -d "{
          \"channel\": \"C0AQ2P76USJ\",
          \"text\": \"synthesist ${CI_COMMIT_TAG} released\\n${CI_PROJECT_URL}/-/releases/${CI_COMMIT_TAG}\"
        }"
  rules:
    - if: $CI_COMMIT_TAG

notify:failure:
  stage: notify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -s -X POST "https://slack.com/api/chat.postMessage" \
        -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
        -H "Content-type: application/json" \
        -d "{
          \"channel\": \"C0AQ2P76USJ\",
          \"text\": \"synthesist pipeline failed on ${CI_COMMIT_REF_NAME}\\n${CI_PIPELINE_URL}\"
        }"
  when: on_failure

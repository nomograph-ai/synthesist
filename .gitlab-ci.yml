# gitlab.com/nomograph/synthesist .gitlab-ci.yml
#
# Pipeline structure provided by nomograph/pipeline tool-rust@v5.2.1:
# stages, default policy (retry/timeout/interruptible), gates (hygiene,
# license-policy, readme-shape, release-discipline, registry-coherence,
# deps-scan), agent-shape check, build matrix, cosign signing, package
# registry upload, crates.io publish, GitLab release, notify-kits.

default:
  tags: [storr]

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - component: gitlab.com/nomograph/pipeline/tool-rust@v5.3.1
    inputs:
      binary_name: synthesist
      project_description: "Specification graph manager for AI-augmented projects, on the nomograph-claim substrate."
      # crates.io publish is DEFERRED for pre.1: tagging ships the
      # BINARY only and must not push to the registry. Flip back to
      # true (with crates_workspace_packages restored) when publish is
      # re-enabled in a later phase.
      crates_publish: false
  # Fail-closed automerge gate (renovate-architecture L1 verdict
  # contract): osv-verdict -> CHECK_OSV, cargo-verdict -> CHECK_CARGO
  # (builds+tests the workspace), automerge-gate blocks unless every
  # required check is PRESENT and ==pass. The gate job's green/red is
  # the pipeline status Renovate reads before GitLab native auto-merge.
  - component: gitlab.com/nomograph/pipeline/osv-verdict@v5.3.1
    inputs:
      stage: verdict
  - component: gitlab.com/nomograph/pipeline/cargo-verdict@v5.3.1
    inputs:
      stage: verdict
      cargo_test_args: "--workspace"
  - component: gitlab.com/nomograph/pipeline/automerge-gate@v5.3.1
    inputs:
      stage: gate
      required-checks: "osv,cargo"

stages: [lint, test, build, sign, publish, release, notify, verdict, gate]

# Backstop against the .agent/skills recurrence class. If any committed
# symlink in this repo resolves to an absolute path, fail before CI
# spends time on the heavier stages. See scripts/check-symlinks.sh.
check-symlinks:
  stage: lint
  image: alpine:3.24
  before_script:
    - apk add --no-cache bash git
  script:
    - bash scripts/check-symlinks.sh

stages:
  - test
  - build
  - publish
  - release

variables:
  BINARY_NAME: synth

# storr = group runner (storr.dunn.dev). All Linux jobs go here.
# saas-macos-medium-m1 = instance runner. Only macOS build uses this.
default:
  tags:
    - storr

# =============================================================================
# Test
# =============================================================================

test:
  stage: test
  image: golang:1.26
  before_script:
    - apt-get update -qq && apt-get install -y -qq libicu-dev > /dev/null 2>&1
  script:
    - go vet ./...
    - go test -v -count=1 ./...

test:integration:
  stage: test
  image: golang:1.26
  before_script:
    - apt-get update -qq && apt-get install -y -qq libicu-dev > /dev/null 2>&1
  script:
    - go build -o synth ./cmd/synth
    - mkdir -p /tmp/test-project && cd /tmp/test-project
    - /builds/$CI_PROJECT_PATH/synth init
    - /builds/$CI_PROJECT_PATH/synth task create test/spec "validation task"
    - /builds/$CI_PROJECT_PATH/synth task list test/spec
    - /builds/$CI_PROJECT_PATH/synth task ready test/spec
    - /builds/$CI_PROJECT_PATH/synth task claim test/spec t1
    - /builds/$CI_PROJECT_PATH/synth task done test/spec t1
    - /builds/$CI_PROJECT_PATH/synth version
    - /builds/$CI_PROJECT_PATH/synth skill | head -5

# =============================================================================
# Build -- linux on group runner, macOS on instance runner
# =============================================================================

build:linux:
  stage: build
  image: golang:1.26
  before_script:
    - apt-get update -qq && apt-get install -y -qq libicu-dev > /dev/null 2>&1
  script:
    - |
      VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
      echo "Building linux-amd64 version: ${VERSION}"
    - |
      GOOS=linux GOARCH=amd64 go build \
        -ldflags "-X main.version=${VERSION}" \
        -o ${BINARY_NAME}-linux-amd64 ./cmd/synth
    - ls -lh ${BINARY_NAME}-*
    - sha256sum ${BINARY_NAME}-* > checksums-linux.txt
    - cat checksums-linux.txt
  artifacts:
    paths:
      - ${BINARY_NAME}-linux-amd64
      - checksums-linux.txt
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"

build:darwin:
  stage: build
  tags:
    - saas-macos-medium-m1    # instance runner -- only job that uses it
  image: macos-15-xcode-16
  before_script:
    - brew install go icu4c@78
  script:
    - |
      VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
      ICU_PREFIX=$(brew --prefix icu4c@78)
      echo "Building darwin-arm64 version: ${VERSION}"
    - |
      CGO_ENABLED=1 \
      CGO_CFLAGS="-I${ICU_PREFIX}/include" \
      CGO_CXXFLAGS="-I${ICU_PREFIX}/include" \
      CGO_LDFLAGS="-L${ICU_PREFIX}/lib" \
      GOOS=darwin GOARCH=arm64 go build \
        -ldflags "-X main.version=${VERSION}" \
        -o ${BINARY_NAME}-darwin-arm64 ./cmd/synth
    - ls -lh ${BINARY_NAME}-*
    - shasum -a 256 ${BINARY_NAME}-* > checksums-darwin.txt
    - cat checksums-darwin.txt
  artifacts:
    paths:
      - ${BINARY_NAME}-darwin-arm64
      - checksums-darwin.txt
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# Publish to GitLab Package Registry
# =============================================================================

publish:
  stage: publish
  image: alpine:latest
  needs:
    - build:linux
    - build:darwin
  before_script:
    - apk add --no-cache curl
  script:
    - |
      VERSION=${CI_COMMIT_TAG:-${CI_COMMIT_SHORT_SHA}}
      echo "Publishing version: ${VERSION}"
    - |
      cat checksums-linux.txt checksums-darwin.txt > checksums.txt
      cat checksums.txt
    - |
      for binary in ${BINARY_NAME}-linux-amd64 ${BINARY_NAME}-darwin-arm64; do
        echo "Uploading ${binary}..."
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file ${binary} \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${VERSION}/${binary}"
      done
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file checksums.txt \
           "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/${VERSION}/checksums.txt"
    - |
      if [ -n "${CI_COMMIT_TAG}" ]; then
        echo "Tag build -- also publishing as 'latest'..."
        for binary in ${BINARY_NAME}-linux-amd64 ${BINARY_NAME}-darwin-arm64; do
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file ${binary} \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/latest/${binary}"
        done
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
             --upload-file checksums.txt \
             "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${BINARY_NAME}/latest/checksums.txt"
      fi
    - echo "Publish complete!"
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"

# =============================================================================
# Release -- GitLab Release with binary assets (tags only)
# =============================================================================

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - publish
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "synth $CI_COMMIT_TAG"
    description: |
      ## Synthesist v5 -- Temporal Specification Graphs

      Dolt-backed specification graph manager for AI-augmented contribution strategy.

      ## Install (mise)

      ```toml
      [tools]
      "ubi:nomograph/synthesist" = { version = "${CI_COMMIT_TAG}", exe = "synth", provider = "gitlab" }
      ```

      ## Install (manual)

      ```bash
      # macOS (Apple Silicon)
      curl -L "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synth/${CI_COMMIT_TAG}/synth-darwin-arm64" -o synth
      chmod +x synth && ./synth init

      # Linux (amd64)
      curl -L "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synth/${CI_COMMIT_TAG}/synth-linux-amd64" -o synth
      chmod +x synth && ./synth init
      ```
    assets:
      links:
        - name: synth-linux-amd64
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synth/${CI_COMMIT_TAG}/synth-linux-amd64
          link_type: package
        - name: synth-darwin-arm64
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synth/${CI_COMMIT_TAG}/synth-darwin-arm64
          link_type: package
        - name: checksums.txt
          url: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/synth/${CI_COMMIT_TAG}/checksums.txt
          link_type: other
  rules:
    - if: $CI_COMMIT_TAG

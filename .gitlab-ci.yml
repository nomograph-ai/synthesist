# gitlab.com/nomograph/synthesist .gitlab-ci.yml
#
# Pipeline structure provided by nomograph/pipeline tool-rust@v4.2.3:
# stages, default policy (retry/timeout/interruptible), gates (hygiene,
# license-policy, readme-shape, release-discipline, registry-coherence,
# deps-scan), agent-shape check, build matrix, cosign signing, package
# registry upload, crates.io publish, GitLab release, notify-kits.

default:
  tags: [storr]

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - component: gitlab.com/nomograph/pipeline/tool-rust@v4.2.3
    inputs:
      binary_name: synthesist
      project_description: "Specification graph manager for AI-augmented projects, on the nomograph-claim substrate."
      crates_publish: true
      # Monorepo: synthesist is now a Cargo workspace whose members are the
      # claim substrate (claim/) and the synthesist crate at the root. The
      # publish job iterates this list in order, so the substrate (a path
      # dependency of synthesist) is published to crates.io first.
      crates_workspace_packages: "nomograph-claim, nomograph-synthesist"

# Backstop against the .agent/skills recurrence class. If any committed
# symlink in this repo resolves to an absolute path, fail before CI
# spends time on the heavier stages. See scripts/check-symlinks.sh.
check-symlinks:
  stage: lint
  image: alpine:3.19
  before_script:
    - apk add --no-cache bash git
  script:
    - bash scripts/check-symlinks.sh

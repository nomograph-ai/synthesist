<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <rect x="0" y="0" width="256" height="256" fill="#faf6ed"/>
  <rect x="20" y="20" width="216" height="216" fill="none" stroke="#2c2417" stroke-width="4"/>
  <rect x="28" y="28" width="200" height="36" fill="#2c2417"/>
  <text x="128" y="53" text-anchor="middle" font-size="20" fill="#faf6ed" font-weight="bold">claim</text>

  <!-- Cylinder centered -->
  <ellipse cx="128" cy="110" rx="44" ry="12" fill="#faf6ed" stroke="#2c2417" stroke-width="3"/>
  <line x1="84" y1="110" x2="84" y2="180" stroke="#2c2417" stroke-width="3"/>
  <line x1="172" y1="110" x2="172" y2="180" stroke="#2c2417" stroke-width="3"/>
  <path d="M 84 180 A 44 12 0 0 0 172 180" fill="#faf6ed" stroke="#2c2417" stroke-width="3"/>

  <!-- Arrow in (left side, pointing into cylinder) -->
  <line x1="40" y1="145" x2="80" y2="145" stroke="#2c2417" stroke-width="3"/>
  <polygon points="80,145 70,140 70,150" fill="#2c2417"/>

  <!-- Arrow out (right side, pointing away) -->
  <line x1="176" y1="145" x2="216" y2="145" stroke="#2c2417" stroke-width="3"/>
  <polygon points="216,145 206,140 206,150" fill="#2c2417"/>

  <!-- Base rule line -->
  <line x1="60" y1="228" x2="196" y2="228" stroke="#c4b99a" stroke-width="2"/>
</svg>

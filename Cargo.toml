[package]
name = "nomograph-synthesist"
version = "2.5.1"
edition = "2024"
rust-version = "1.88"
description = "Specification graph manager"
authors = ["Andrew Dunn <andunn@gitlab.com>"]
repository = "https://gitlab.com/nomograph/synthesist"
homepage = "https://gitlab.com/nomograph/synthesist"
keywords = ["specification", "task", "dag", "agent"]
categories = ["command-line-utilities"]
readme = "README.md"
exclude = [
    "target/*",
    "claims/*",
    ".synth/*",
    ".lock",
    "*.swp",
    "*.png",
    "*.svg",
    "hero.*",
    "avatar.*",
    "/synthesist",
    "dist/*",
    "tools/*",
    "docs/*",
    "MIGRATION.md",
    # Development-time files; downstream Rust consumers don't need them.
    "agent-shape.toml",         # jig rubric for our own CI; useless to crates.io consumers
    "agent-shape-reports/*",    # jig run outputs (1.2 MB of regression baselines)
    "scripts/*",                # CI helpers (check-symlinks.sh, future additions)
    ".agent/*",                 # AGENTS.md ecosystem compat dir; regenerated by Makefile
]
license = "MIT"

[[bin]]
name = "synthesist"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
rusqlite = { version = "0.39", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
time = { version = "0.3", features = ["local-offset", "formatting", "macros"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
nomograph-claim = "0.2"
nomograph-workflow = "0.3"
# `serve` uses async axum + a fs watcher. See src/cmd_serve.rs.
# Replaced rouille (sync, smaller deps) with axum because axum has
# the bigger community trajectory (tokio + tower) and natively
# supports SSE for push-based updates.
axum = "0.8"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
tokio-stream = { version = "0.1", features = ["sync"] }
notify = "6"
futures-util = "0.3"

[features]
# Legacy SQL-backed commands not yet ported to the claim substrate.
# Wave 4 ports them in M2 (session/phase/init/status/check/export/sql)
# and M3 (discovery/campaign/landscape). Gate defaults to off so the
# M1-owned modules (store, schema, cmd_tree, cmd_spec, cmd_task) can be
# built + tested independently. M5 removes this feature.
default = []
legacy-sql = []

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"

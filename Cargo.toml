[package]
name = "synthesist"
version = "1.0.0"
edition = "2024"
description = "Specification graph manager"
repository = "https://gitlab.com/nomograph/synthesist"
homepage = "https://gitlab.com/nomograph/synthesist"
keywords = ["specification", "task", "dag", "agent"]
categories = ["command-line-utilities"]
readme = "README.md"
license = "MIT"
rust-version = "1.88"

[[bin]]
name = "synthesist"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
rusqlite = { version = "0.39", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
time = { version = "0.3", features = ["local-offset", "formatting", "macros"] }

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"

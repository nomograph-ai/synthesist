<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <rect x="0" y="0" width="256" height="256" fill="#faf6ed" stroke="#2c2417" stroke-width="4"/>
  <rect x="12" y="12" width="232" height="36" fill="#2c2417"/>
  <text x="128" y="37" text-anchor="middle" font-size="16" fill="#faf6ed" font-weight="bold">synthesist</text>
  <!-- Tree trunk -->
  <line x1="128" y1="68" x2="128" y2="222" stroke="#2c2417" stroke-width="4"/>
  <!-- Branches (tree structure) -->
  <line x1="128" y1="80" x2="68" y2="100" stroke="#2c2417" stroke-width="2.5"/>
  <line x1="128" y1="80" x2="188" y2="100" stroke="#2c2417" stroke-width="2.5"/>
  <line x1="128" y1="120" x2="80" y2="140" stroke="#2c2417" stroke-width="2.5"/>
  <line x1="128" y1="120" x2="176" y2="140" stroke="#2c2417" stroke-width="2.5"/>
  <line x1="128" y1="160" x2="90" y2="180" stroke="#2c2417" stroke-width="2.5"/>
  <line x1="128" y1="160" x2="166" y2="180" stroke="#2c2417" stroke-width="2.5"/>
  <line x1="128" y1="195" x2="100" y2="210" stroke="#6b5d4f" stroke-width="2"/>
  <!-- Spec nodes at branch tips -->
  <rect x="52" y="94" width="32" height="14" fill="#faf6ed" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="172" y="94" width="32" height="14" fill="#faf6ed" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="64" y="134" width="32" height="14" fill="#faf6ed" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="160" y="134" width="32" height="14" fill="#faf6ed" stroke="#2c2417" stroke-width="1.5"/>
  <rect x="74" y="174" width="32" height="14" fill="#faf6ed" stroke="#6b5d4f" stroke-width="1.5"/>
  <rect x="150" y="174" width="32" height="14" fill="#faf6ed" stroke="#6b5d4f" stroke-width="1.5"/>
  <rect x="84" y="204" width="32" height="14" fill="#faf6ed" stroke="#6b5d4f" stroke-width="1.5"/>
  <!-- Agent dots moving along branches -->
  <circle cx="98" cy="90" r="4" fill="#2c2417"/>
  <circle cx="155" cy="130" r="4" fill="#2c2417"/>
  <circle cx="110" cy="170" r="4" fill="#6b5d4f"/>
  <!-- Motion trails -->
  <line x1="103" y1="88" x2="115" y2="83" stroke="#c4b99a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="160" y1="128" x2="168" y2="123" stroke="#c4b99a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="115" y1="168" x2="122" y2="163" stroke="#c4b99a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Base line -->
  <line x1="60" y1="234" x2="196" y2="234" stroke="#c4b99a" stroke-width="2"/>
</svg>
